# AuthScape custom login theme for Keycloak.
# Recreates the AuthScape IDP (OpenIddict.IDP) login/register design.
# login.ftl and register.ftl are fully self-contained (they don't extend the
# base template), but we still inherit from the keycloak parent so the other
# flows (error, info, reset password, verify email, ...) keep working.
parent=keycloak
import=common/keycloak
